name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1   # ✅ FIXED

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ BUILD & PUSH IAAM
      - name: Build & Push IAAM
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/iaam-nextjs:latest ./IAAM--Frontend-Devlopement
          docker push ${{ steps.login-ecr.outputs.registry }}/iaam-nextjs:latest

      # ✅ BUILD & PUSH SSinstrument
      - name: Build & Push SSinstrument
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/ssinstrument-nextjs:latest ./SSinstruments-Frontend
          docker push ${{ steps.login-ecr.outputs.registry }}/ssinstrument-nextjs:latest

      # ✅ BUILD & PUSH STRAPI
      - name: Build & Push Strapi
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/strapi:latest ./iaamonline_STRAPI_HeadlessCMS
          docker push ${{ steps.login-ecr.outputs.registry }}/strapi:latest


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "🚀 Deploy Start"

            # Go to app directory
            mkdir -p /opt/myapp
            cd /opt/myapp

            # Clone repo if not exists
            if [ ! -d ".git" ]; then
              git clone https://github.com/Ahadinash-Shootorder/IAAM-Website.git .
            else
              git pull origin main
            fi

            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_REGISTRY }}

            # Export registry for docker-compose
            export ECR_REGISTRY=${{ secrets.AWS_REGISTRY }}

            # Pull latest images
            docker-compose pull

            # Restart services
            docker-compose up -d --remove-orphans

            # Cleanup
            docker system prune -f

            echo "✅ Deploy Done"
































